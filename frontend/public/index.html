<!DOCTYPE html>

    <style>

        thead th { color: white !important; }
        .print-header { display: flex !important; }
        h1, h2, h3 { color: #2D1B00 !important; }
        .badge { border: 1px solid #aaa !important; }
        table { font-size: 10px; }
      }
